name: Build and Deploy to Cloud Run Job

on:
  push:
    branches:
      - main  

env:
  PROJECT_ID: data-scraping-499714 
  REGION: asia-east1               
  REPO_NAME: crawler-repo         
  JOB_NAME: weather-crawler-job    

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Configure Docker for GCP
      run: |
        gcloud auth configure-docker asia-east1-docker.pkg.dev --quiet

    - name: Build and Push Docker Image
      run: |
        TAG=asia-east1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.JOB_NAME }}:${{ github.sha }}
        docker build -t $TAG .
        docker push $TAG
        echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV

    - name: Deploy to Cloud Run Job
      run: |
        gcloud beta run jobs deploy ${{ env.JOB_NAME }} \
          --image ${{ env.IMAGE_TAG }} \
          --region ${{ env.REGION }} \
          --max-retries 0 \
          --quiet